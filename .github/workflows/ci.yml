name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── SpecOS Validation ──────────────────────────────────────
  specos:
    name: 📋 SpecOS — Cross-Artifact Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate SpecOS integrity
        run: cd specos && python3 validate_specos.py

      - name: Check spec compliance
        run: python3 scripts/spec-compliance.py

  tests:
    name: 🧪 Tests — Contract & Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root test dependencies
        run: npm ci

      - name: Install API runtime dependencies for imported server modules
        working-directory: api
        run: npm ci

      - name: Run Jest suite
        run: npm test -- --runInBand

  # ── Web (Next.js) ────────────────────────────────────────
  web:
    name: 🌐 Web — Lint, Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── API (Express + TypeScript) ───────────────────────────
  api:
    name: ⚙️ API — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  api-smoke:
    name: 🧪 API — Canonical Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Start API
        working-directory: api
        run: |
          nohup npm run dev >/tmp/bma3-api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy"
          cat /tmp/bma3-api.log
          exit 1

      - name: Canonical smoke
        working-directory: api
        run: npm run smoke:canonical

      - name: Show API log on failure
        if: failure()
        run: cat /tmp/bma3-api.log
